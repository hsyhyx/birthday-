<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            color: #ff6b6b;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #ff6b6b;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        button {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }
        
        .result-page {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 50px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }
        
        .result-page h2 {
            color: #ff6b6b;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        
        .result-page p {
            font-size: 18px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 40px;
        }
        
        .share-section {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
        }
        
        .share-section h3 {
            color: #555;
            margin-bottom: 15px;
        }
        
        .share-link {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            word-break: break-all;
            margin-bottom: 10px;
        }
        
        .copy-button {
            background: linear-gradient(135deg, #4ecdc4, #45b7d1);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .copy-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.4);
        }
        
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ff6b6b;
            border-radius: 50%;
            top: -10px;
            animation: fall linear infinite;
            z-index: 9999;
        }
        
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        @media (max-width: 768px) {
            .container,
            .result-page {
                padding: 20px;
            }
            
            h1,
            .result-page h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 输入界面 -->
    <div id="inputContainer" class="container">
        <h1>🎂 生日快乐！🎂</h1>
        
        <form id="birthdayForm">
            <div class="form-group">
                <label for="name">同学姓名：</label>
                <input type="text" id="name" placeholder="请输入同学的姓名" required>
            </div>
            
            <div class="form-group">
                <label for="message">祝福语：</label>
                <textarea id="message" placeholder="请输入你的祝福语..." required></textarea>
            </div>
            
            <button type="submit">生成祝福</button>
        </form>
    </div>
    
    <!-- 祝福展示页面 -->
    <div id="resultContainer" class="result-page" style="display: none;">
        <h2>🎁 生日祝福 🎁</h2>
        <p id="greeting"></p>
        <div class="share-section">
            <h3>分享链接</h3>
            <div class="share-link" id="shareLink"></div>
            <button class="copy-button" onclick="copyLink()">复制链接</button>
        </div>
    </div>
    
    <script>
        // 检查URL参数，判断是否为分享链接
        function checkUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const name = urlParams.get('name');
            const message = urlParams.get('message');
            
            if (name && message) {
                // 显示结果页面
                document.getElementById('inputContainer').style.display = 'none';
                document.getElementById('resultContainer').style.display = 'block';
                
                const greeting = document.getElementById('greeting');
                greeting.innerHTML = `亲爱的 ${decodeURIComponent(name)}：<br><br>${decodeURIComponent(message)}<br><br>祝你生日快乐，天天开心！🎉`;
                
                // 生成彩色纸屑
                createConfetti();
            }
        }
        
        // 表单提交处理
        document.getElementById('birthdayForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const message = document.getElementById('message').value;
            
            // 生成分享链接
            const shareUrl = `${window.location.origin}${window.location.pathname}?name=${encodeURIComponent(name)}&message=${encodeURIComponent(message)}`;
            
            // 更新分享链接显示
            document.getElementById('shareLink').textContent = shareUrl;
            
            // 显示结果页面
            document.getElementById('inputContainer').style.display = 'none';
            document.getElementById('resultContainer').style.display = 'block';
            
            const greeting = document.getElementById('greeting');
            greeting.innerHTML = `亲爱的 ${name}：<br><br>${message}<br><br>祝你生日快乐，天天开心！🎉`;
            
            // 生成彩色纸屑
            createConfetti();
        });
        
        // 复制链接功能
        function copyLink() {
            const shareLink = document.getElementById('shareLink').textContent;
            navigator.clipboard.writeText(shareLink).then(function() {
                alert('链接已复制到剪贴板！');
            }, function(err) {
                alert('复制失败，请手动复制链接');
            });
        }
        
        // 生成彩色纸屑
        function createConfetti() {
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#dfe6e9'];
            
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = Math.random() * 10 + 5 + 'px';
                confetti.style.height = confetti.style.width;
                confetti.style.animationDuration = Math.random() * 3 + 2 + 's';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                
                document.body.appendChild(confetti);
                
                // 3秒后移除纸屑
                setTimeout(() => {
                    confetti.remove();
                }, 5000);
            }
        }
        
        // 页面加载时检查URL参数
        window.onload = checkUrlParams;
    </script>
</body>
</html>
